<!DOCTYPE html>
<html lang="zh-CN">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>联系我们 - 河北工业大学山海机甲</title>
    <link rel="stylesheet" href="style.css">
    <link rel="icon" href="source/logo/color_logo.png" type="image/png">
</head>

<body>
    <header>
        <nav>
            <div class="logo">
                <a href="./index.html">
                    <img src="source/logo/title_logo.png" alt="MAS Logo" class="logo-icon">
                </a>
            </div>
            <ul>
                <li><a href="index.html">首页</a></li>
                <li><a href="https://www.robomaster.com/zh-CN" target="_blank">赛事链接</a></li>
                <li><a href="members.html">战队成员</a></li>
                <li><a href="open_source.html">项目开源</a></li>
                <li><a href="contact.html">联系我们</a></li>
            </ul>
            <div class="menu-toggle">
                <span></span>
                <span></span>
                <span></span>
            </div>
        </nav>
    </header>

    <main>
        <section class="page-header">
            <h1>联系我们</h1>
            <p>欢迎与我们取得联系</p>
        </section>

        <section class="contact-section">
            <div class="contact-content">
                <div class="contact-info">
                    <h2>联系方式</h2>
                    <div class="contact-methods">
                        <div class="contact-method">
                            <h3>📍 地址</h3>
                            <p>河北工业大学</p>
                        </div>
                        <div class="contact-method">
                            <h3>📧 邮箱</h3>
                            <p><a href="mailto:contact@example.com">contact@example.com</a></p>
                        </div>
                        <div class="contact-method">
                            <h3>📱 社交媒体</h3>
                            <div class="social-links">
                                <a href="https://space.bilibili.com/495153187" title="Bilibili">
                                    <img src="source/icons/bilibili.svg" alt="Bilibili">
                                </a>
                                <a href="https://github.com/SCU-Hotpot" title="GitHub">
                                    <img src="source/icons/github.svg" alt="GitHub">
                                </a>
                                <a href="https://mp.weixin.qq.com/s/_IwysdZ0XtVuNgU50WqRaw" title="微信">
                                    <img src="source/icons/wechat.svg" alt="WeChat">
                                </a>
                            </div>
                        </div>
                    </div>
                </div>
                <div class="contact-form">
                    <h2>发送消息</h2>
                    <form>
                        <div class="form-group">
                            <label for="name">姓名</label>
                            <input type="text" id="name" name="name" required>
                        </div>
                        <div class="form-group">
                            <label for="email">邮箱</label>
                            <input type="email" id="email" name="email" required>
                        </div>
                        <div class="form-group">
                            <label for="message">消息</label>
                            <textarea id="message" name="message" rows="5" required></textarea>
                        </div>
                        <button type="submit" class="submit-btn">发送</button>
                    </form>
                </div>
            </div>
        </section>
    </main>

    <footer>
        <div class="footer-main-content">
            <div class="footer-left">
                <div class="school-logo">
                    <h3>机构单位</h3>
                    <a href="https://www.hebut.edu.cn/" target="_blank"><img src="source/logo/hebut_logo.png" alt="hebut Logo"></a>
                    <a href="https://mes.hebut.edu.cn/" target="_blank"><img src="source/logo/hebut_me.png" alt="me Logo"></a>
                </div>
            </div>
            <div class="footer-divider"></div>
            <div class="footer-right">
                <div class="partners-footer">
                    <h3>合作伙伴</h3>
                    <div class="partners-list">
                        <a href="https://bambulab.com/zh"><img src="source/partners/bambu_lab.png" alt="Bambu Lab"></a>
                        <a href="https://mp.weixin.qq.com/s/0UuR9th292TXjF8UEMRgrQ"><img src="source/partners/stem.png" alt="stem"></a>
                        <a href="#"><img src="source/partners/hcw.png" alt="Hachangwei"></a>
                        <a href="https://www.cuav.net/"><img src="source/partners/cuav.png" alt="cuav"></a>
                        <a href="https://www.china-amass.com/"><img src="source/partners/amass.png" alt="amass"></a>
                    </div>
                    <p>（以上排名不分先后）</p>
                </div>
                <div class="friendly-links">
                    <h3>友情链接</h3>
                    <div class="links-list">
                        <a href="https://testing.tuxmonkey.cloud/" target="_blank">大连民族大学-C.ONE战队</a>
                    </div>
                </div>
            </div>
        </div>
        <p class="footer-copyright">© 2026 河北工业大学RoboMaster山海机甲战队. All Rights Reserved.</p>
    </footer>

    <script src="script.js"></script>
    <script src="nav.js"></script>
</body>

</html>
